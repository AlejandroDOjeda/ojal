name: Migraciones de base de datos

on:
  push:
    branches:
      - develop
      - main
    paths:
      - 'supabase/migrations/**'  # solo corre si hay cambios en migraciones

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # En develop → aplica migraciones al proyecto DEV
      - name: Migrar base de datos DEV
        if: github.ref == 'refs/heads/develop'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF_DEV }} \
                        --password ${{ secrets.SUPABASE_DB_PASSWORD_DEV }}
          supabase db push --include-all

      # En main → aplica migraciones al proyecto PROD
      # TEMPORAL: --include-all para destrabar 20260623000008, que quedó
      # fuera de orden porque se borró su registro en schema_migrations.
      # Revertir a "supabase db push" (sin flag) apenas corra una vez OK.
      - name: Migrar base de datos PROD
        if: github.ref == 'refs/heads/main'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF_PROD }} \
                        --password ${{ secrets.SUPABASE_DB_PASSWORD_PROD }}
          supabase db push --include-all
